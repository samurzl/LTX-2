# =============================================================================
# LTX-2 Audio-Video LoRA Training with NSYNC + Noise Experts + Mixed Audio
# =============================================================================
#
# This example enables the new advanced LoRA trainer features together:
#   - two noise-level LoRA experts (low_noise and high_noise)
#   - NSYNC layer-wise gradient projection with synthetic negative videos
#   - mixed audio/no-audio training
#   - optional Comfy-style per-component checkpoint paths
#
# Preprocess with generated negatives and audio activity filtering:
#
# uv run python scripts/process_dataset.py dataset.json \
#   --resolution-buckets "576x576x89" \
#   --model-path /path/to/ltx-2-model.safetensors \
#   --text-encoder-path /path/to/gemma.safetensors \
#   --with-audio \
#   --mixed-audio \
#   --audio-min-rms-db -60 \
#   --audio-min-active-ratio 0.01 \
#   --generate-negatives \
#   --negative-distilled-lora /path/to/ltx-2-distilled-lora.safetensors \
#   --negative-quantization auto \
#   # Or delegate quantized negative generation to a running ComfyUI server:
#   # --negative-backend comfy --comfy-server http://127.0.0.1:8188 \
#   --negative-latents-dir negative_latents
#
# =============================================================================

model:
  # Default two-safetensors setup:
  #   1. model_path: the LTX single-file checkpoint
  #   2. text_encoder_path: the Gemma single-file checkpoint
  # Set this to null when all required weights are supplied through component_paths below.
  model_path: "/path/to/ltx-2-model.safetensors"
  text_encoder_path: "/path/to/gemma.safetensors"
  training_mode: "lora"
  load_checkpoint: null

  # Optional: override any component when using a split Comfy-style layout.
  # Unset entries fall back to model_path/text_encoder_path above.
  component_paths:
    transformer: "/path/to/comfy/diffusion_model.safetensors"
    embeddings_processor: "/path/to/comfy/text_embedding_projection.safetensors"
    video_vae: "/path/to/comfy/video_vae.safetensors"
    audio_vae: "/path/to/comfy/audio_vae.safetensors"
    vocoder: "/path/to/comfy/vocoder.safetensors"
    text_encoder: "/path/to/comfy/gemma.safetensors"

lora:
  rank: 32
  alpha: 32
  dropout: 0.0
  target_modules:
    - "to_k"
    - "to_q"
    - "to_v"
    - "to_out.0"

  # Each expert is saved as its own LoRA file.
  noise_experts:
    low_noise: [0.0, 0.5]
    high_noise: [0.5, 1.0]

  nsync:
    enabled: true
    negative_latents_dir: "negative_latents"
    projection_scope: "layer"
    eps: 1.0e-12

training_strategy:
  name: "text_to_video"
  first_frame_conditioning_p: 0.5
  with_audio: true
  mixed_audio: true
  audio_latents_dir: "audio_latents"

optimization:
  learning_rate: 1.0e-4
  steps: 2000
  batch_size: 1
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  optimizer_type: "adamw"
  scheduler_type: "linear"
  scheduler_params: { }
  # Fast single-80GB default: keep checkpointing off unless your exact resolution/rank OOMs.
  enable_gradient_checkpointing: false

acceleration:
  mixed_precision_mode: "bf16"
  # A100 throughput default: keep the trainable run bf16. Use "fp8-quanto" only if memory becomes the limiter.
  quantization: null
  load_text_encoder_in_8bit: false
  offload_optimizer_during_validation: false

data:
  preprocessed_data_root: "/path/to/preprocessed/data"
  num_dataloader_workers: 4

validation:
  prompts:
    - "A detailed cinematic video with synchronized natural audio matching the scene."
  negative_prompt: "worst quality, inconsistent motion, blurry, jittery, distorted"
  images: null
  reference_videos: null
  video_dims: [576, 576, 89]
  frame_rate: 25.0
  seed: 42
  inference_steps: 12
  # Validation is expensive; keep it infrequent for throughput, or set null to disable.
  interval: 500
  guidance_scale: 4.0
  stg_scale: 1.0
  stg_blocks: [29]
  stg_mode: "stg_av"
  generate_audio: true
  skip_initial_validation: false
  include_reference_in_output: false

checkpoints:
  interval: 250
  keep_last_n: -1
  precision: "bfloat16"
  no_resume: false
  save_training_state: "minimal"

flow_matching:
  timestep_sampling_mode: "shifted_logit_normal"
  timestep_sampling_params: { }

hub:
  push_to_hub: false
  hub_model_id: null

wandb:
  enabled: false
  project: "ltx-2-trainer"
  entity: null
  tags: ["ltx2", "lora", "nsync", "noise-experts", "mixed-audio"]
  log_validation_videos: true

seed: 42
output_dir: "outputs/ltx2-av-lora-nsync-noise-experts"
